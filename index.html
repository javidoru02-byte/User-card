<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User card</title>

    <link rel="stylesheet" href="./assets/css/reset.css" />

    <link rel="stylesheet" href="./assets/css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <article class="user-card">
      <div class="born-place">
        <i class="fa-solid fa-location-arrow"></i>
        <p>California, U.S.</p>
      </div>
      <img
        class="user-img"
        src="./assets/images/kendrick.jpg"
        alt="Kendick Lamar"
      />
      <div class="user-info">
        <h2>Kendrick Lamar</h2>

        <p>
          American rapper, songwriter, and record producer. One of the greatest
          rappers of all time.
        </p>
      </div>

      <input type="submit" value="Follow" class="follow" />

      <div class="social-media">
        <div class="social">
          <i class="fa-regular fa-image"></i>
          <div class="social-info">
            <p>Posts</p>
            <p>934</p>
          </div>
        </div>

        <div class="social central">
          <i class="fa-regular fa-heart"></i>
          <div class="social-info">
            <p>Favorites</p>
            <p>3,763</p>
          </div>
        </div>

        <div class="social">
          <i class="fa-brands fa-telegram"></i>
          <div class="social-info">
            <p>Messages</p>
            <p>3,763</p>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
